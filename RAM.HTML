<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Registration System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4 mb-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h2 class="text-center">
EMPLOYEE DETAILS CARD
</h2>

</div>

<div class="card-body">

<form id="employeeForm">

<!---------------- Photo ---------------->

<div class="text-center mb-4">

<img src="https://via.placeholder.com/150"
id="preview"
class="rounded border"
width="150">

<br><br>

<input type="file"
id="photo"
class="form-control w-25 mx-auto">

</div>

<!---------------- Personal Details ---------------->

<h4 class="section-title">
Personal Details
</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>Employee Name</label>

<input
type="text"
class="form-control"
id="empName">

</div>

<div class="col-md-6 mb-3">

<label>Father / Husband Name</label>

<input
type="text"
class="form-control"
id="fatherName">

</div>

<div class="col-md-4 mb-3">

<label>Date of Birth</label>

<input
type="date"
class="form-control"
id="dob">

</div>

<div class="col-md-4 mb-3">

<label>Aadhaar No</label>

<input
type="text"
class="form-control"
maxlength="12"
id="aadhaar">

</div>

<div class="col-md-4 mb-3">

<label>PAN No</label>

<input
type="text"
class="form-control"
id="pan">

</div>

<div class="col-md-6 mb-3">

<label>Qualification</label>

<select class="form-select"
id="qualification">

<option>10th</option>
<option>12th</option>
<option>Graduate</option>
<option>Post Graduate</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Marital Status</label>

<select class="form-select"
id="marital">

<option>Single</option>
<option>Married</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number</label>

<input
type="text"
class="form-control"
id="mobile">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
id="email">

</div>

<div class="col-12 mb-3">

<label>Permanent Address</label>

<textarea
class="form-control"
rows="3"
id="address"></textarea>

</div>

</div>

<!---------------- Bank Details ---------------->

<h4 class="section-title">
Bank Details
</h4>

<div class="row">

<div class="col-md-4">

<label>Bank Account</label>

<input
type="text"
class="form-control"
id="account">

</div>

<div class="col-md-4">

<label>IFSC Code</label>

<input
type="text"
class="form-control"
id="ifsc">

</div>

<div class="col-md-4">

<label>Bank Address</label>

<input
type="text"
class="form-control"
id="bankAddress">

</div>

</div>

<br>

<!---------------- Family Details ---------------->

<h4 class="section-title">
Family Details
</h4>

<table class="table table-bordered">

<thead class="table-primary">

<tr>

<th>Name</th>

<th>Relation</th>

<th>DOB</th>

<th>Aadhaar</th>

<th></th>

</tr>

</thead>

<tbody id="familyTable">

<tr>

<td>
<input class="form-control">
</td>

<td>

<select class="form-select">

<option>Wife</option>
<option>Child</option>
<option>Father</option>
<option>Mother</option>

</select>

</td>

<td>
<input type="date" class="form-control">
</td>

<td>
<input class="form-control">
</td>

<td>

<button
type="button"
class="btn btn-danger">

Delete

</button>

</td>

</tr>

</tbody>

</table>

<button
type="button"
id="addMember"
class="btn btn-success">

+ Add Family Member

</button>

<br><br>

<!---------------- Office Details ---------------->

<h4 class="section-title">

Office Details

</h4>

<div class="row">

<div class="col-md-4">

<label>Date of Joining</label>

<input
type="date"
class="form-control"
id="joining">

</div>

<div class="col-md-4">

<label>Designation</label>

<input
type="text"
class="form-control"
id="designation">

</div>

<div class="col-md-4">

<label>Place</label>

<input
type="text"
class="form-control"
id="place">

</div>

<div class="col-md-4 mt-3">

<label>UAN</label>

<input
type="text"
class="form-control"
id="uan">

</div>

<div class="col-md-4 mt-3">

<label>EPF</label>

<input
type="text"
class="form-control"
id="epf">

</div>

<div class="col-md-4 mt-3">

<label>ESIC</label>

<input
type="text"
class="form-control"
id="esic">

</div>

<div class="col-md-6 mt-3">

<label>Emergency Mobile 1</label>

<input
type="text"
class="form-control"
id="em1">

</div>

<div class="col-md-6 mt-3">

<label>Emergency Mobile 2</label>

<input
type="text"
class="form-control"
id="em2">

</div>

</div>

<hr>

<div class="text-center">

<button
class="btn btn-primary btn-lg"
type="submit">

Save Employee

</button>

<button
type="reset"
class="btn btn-warning btn-lg">

Clear

</button>

<button
type="button"
class="btn btn-success btn-lg"
id="printBtn">

Print

</button>

</div>

</form>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
